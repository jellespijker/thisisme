<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jelle Spijker | Manager Firmware & Cloud Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              medido: {
                purple: '#380559',
                peach: '#FFAD7E',
                'peach-light': '#FFD6C0',
                gray: '#F9FAFB',
                // Logo specific petal colors
                teal: '#00A99D',
                stone: '#8A959B', 
                orange: '#F15A24',
                pink: '#F4B3CE',
              }
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            fontSize: {
              base: ['18px', '28.08px'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
      
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #ffffff;
        color: #380559; /* Medido Purple */
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #ffffff;
      }
      ::-webkit-scrollbar-thumb {
        background: #380559;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #5a1e75;
      }
      
      /* Markdown Styles within Chat */
      .prose p {
        margin-bottom: 0.5em;
      }
      .prose ul {
        list-style-type: disc;
        padding-left: 1.2em;
        margin-bottom: 0.5em;
      }
      .prose strong {
        color: #FFAD7E; /* Medido Peach */
        font-weight: 700;
      }

      /* Print Styles */
      @media print {
        @page {
          /* Remove default margins to control them via padding for symmetry */
          margin: 0mm;
          size: A4;
        }
        
        body {
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
          background: white;
          margin: 0;
          padding: 0;
          /* 
             A4 width is ~794px at 96DPI. 
             Zoom 0.7 to ensure all of Page 1 fits.
          */
          width: 100% !important;
          zoom: 0.70; 
        }
        
        /* Hide non-essential elements */
        .no-print, button, .chat-widget, footer {
          display: none !important;
        }

        /* Layout Overrides */
        #root > div > main {
            /* Symmetrical Padding: 3rem on left and right */
            padding: 1.5rem 3rem 3rem 3rem !important;
            margin: 0 !important;
            max-width: none !important;
            width: 100% !important;
        }

        header {
            /* Symmetrical Padding matching Main */
            padding-left: 3rem !important;
            padding-right: 3rem !important;
            
            /* Reduced height for print */
            padding-top: 2rem !important; 
            padding-bottom: 2rem !important;
        }
        
        /* Flatten Layout for Print */
        /* Make the main layout stack vertically */
        .lg\:grid-cols-12 {
          display: block !important;
        }
        
        /* Experience Column takes full width */
        .lg\:col-span-8 {
          width: 100% !important;
          margin-bottom: 3rem !important;
        }
        
        /* Sidebar Column becomes a 3-column Grid */
        .lg\:col-span-4 {
          width: 100% !important;
          display: grid !important;
          grid-template-columns: repeat(3, 1fr) !important;
          gap: 2rem !important;
        }

        /* Reset margins applied by space-y-* in sidebar */
        .lg\:col-span-4 > * {
          margin-top: 0 !important;
        }
        
        /* Spacing Adjustments for Print Density */
        .space-y-16 > * + * {
            margin-top: 2.5rem !important;
        }
        .space-y-12 > * + * {
             margin-top: 2rem !important;
        }
        
        /* Page Break Management */
        section {
            break-inside: auto;
        }

        .break-after-page {
            page-break-after: always;
            break-after: page;
            height: 0;
            display: block;
            visibility: hidden;
        }
        
        /* Prevent breaking inside cards */
        .rounded-3xl, .rounded-\[40px\], .bg-white, .bg-medido-gray {
            break-inside: avoid !important;
        }

        /* Clean up links */
        a {
          text-decoration: none !important;
          color: #380559 !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-markdown": "https://esm.sh/react-markdown@9?bundle",
    "@google/genai": "https://esm.run/@google/genai"
  }
}
</script>
</head>

    <div id="root"></div>
  </body>
</html>
